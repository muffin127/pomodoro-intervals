<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Time</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <button id="burger-btn" class="hidden">☰</button>

    <div id="sidebar">
      <h3>Статистика дня</h3>
      <p>Ціль: <span id="stat-goal">—</span></p>
      <p>Виконано: <span id="stat-completed">—</span></p>
      <p>Залишилось: <span id="stat-left">—</span></p>
    </div>

    <div id="setup-screen">
      <h2>Інтервал сьогодні</h2>

      <div class="goal-buttons">
        <button data-goal="4">4</button>
        <button data-goal="5">5</button>
        <button data-goal="6">6</button>
        <button data-goal="7">7</button>
        <button data-goal="8">8</button>
      </div>
    </div>

    <div id="app" class="hidden">
      <div id="timer-display">
        <div id="timer-wrapper">
          <h1 id="time-shadow">88:88</h1>
          <h1 id="time">25:00</h1>
        </div>
      </div>
    </div>

    <div id="long-break-modal" class="hidden">
      <h1>Беремо довгу перерву?</h1>
      <div class="modal-content">
        <button id="modal-yes">так</button>
        <button id="modal-no">ні</button>
      </div>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
